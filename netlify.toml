[build]
  command = "cd packages/frontend && npm install && npm run build"
  publish = "packages/frontend/dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# API routes → serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — all other routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
